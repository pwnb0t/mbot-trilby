openapi: 3.1.0
info:
  title: Sidekick Control API
  version: 0.0.3
servers:
- url: http://127.0.0.1:28765
paths:
  /v1/health:
    get:
      operationId: GetHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Successful Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Unauthorized error response.
      security:
      - APIKeyHeader: []
      summary: Health
  /v1/clips:
    get:
      operationId: ListClips
      parameters:
      - explode: true
        in: query
        name: guild_id
        required: true
        schema:
          exclusiveMinimum: true
          minimum: 0
          title: Guild Id
          type: integer
        style: form
      - explode: true
        in: query
        name: search
        required: false
        schema:
          maxLength: 64
          minLength: 1
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClipsResponse"
          description: Successful Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Unauthorized error response.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Internal error response.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: List Clips
  /v1/clips/play:
    post:
      operationId: PlayClip
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayClipRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayClipResponse"
          description: Successful Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Unauthorized error response.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Bad request error response.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Clip not found error response.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Voice not connected error response.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
          description: Internal error response.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Play Clip
components:
  schemas:
    ApiErrorResponse:
      example:
        code: code
        ok: true
        message: message
      properties:
        ok:
          title: Ok
          type: boolean
        code:
          title: Code
          type: string
        message:
          title: Message
          type: string
      required:
      - code
      - message
      - ok
      title: ApiErrorResponse
    ClipSummary:
      example:
        trigger: trigger
      properties:
        trigger:
          title: Trigger
          type: string
      required:
      - trigger
      title: ClipSummary
    HTTPValidationError:
      example:
        detail:
        - msg: msg
          loc:
          - Location_inner
          - Location_inner
          input: ""
          ctx: "{}"
          type: type
        - msg: msg
          loc:
          - Location_inner
          - Location_inner
          input: ""
          ctx: "{}"
          type: type
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          title: Detail
          type: array
      title: HTTPValidationError
    HealthResponse:
      example:
        service: service
        ok: true
        version: version
      properties:
        ok:
          title: Ok
          type: boolean
        service:
          title: Service
          type: string
        version:
          title: Version
          type: string
      required:
      - ok
      - service
      - version
      title: HealthResponse
    ListClipsResponse:
      example:
        total: 6
        search: search
        clips:
        - trigger: trigger
        - trigger: trigger
        guild_id: 0
        ok: true
      properties:
        ok:
          title: Ok
          type: boolean
        guild_id:
          format: int64
          title: Guild Id
          type: integer
        clips:
          items:
            $ref: "#/components/schemas/ClipSummary"
          title: Clips
          type: array
        total:
          title: Total
          type: integer
        search:
          nullable: true
          type: string
      required:
      - clips
      - guild_id
      - ok
      - total
      title: ListClipsResponse
    PlayClipRequest:
      example:
        guild_id: 0
        trigger: trigger
        request_id: request_id
      properties:
        guild_id:
          exclusiveMinimum: true
          format: int64
          minimum: 0.0
          title: Guild Id
          type: integer
        trigger:
          maxLength: 64
          minLength: 1
          title: Trigger
          type: string
        request_id:
          nullable: true
          type: string
      required:
      - guild_id
      - trigger
      title: PlayClipRequest
    PlayClipResponse:
      example:
        guild_id: 0
        resolved_trigger: resolved_trigger
        trigger: trigger
        ok: true
        request_id: request_id
        status: playing
      properties:
        ok:
          title: Ok
          type: boolean
        guild_id:
          format: int64
          title: Guild Id
          type: integer
        trigger:
          title: Trigger
          type: string
        resolved_trigger:
          title: Resolved Trigger
          type: string
        status:
          enum:
          - playing
          title: Status
          type: string
        request_id:
          nullable: true
          type: string
      required:
      - guild_id
      - ok
      - resolved_trigger
      - status
      - trigger
      title: PlayClipResponse
    ValidationError:
      example:
        msg: msg
        loc:
        - Location_inner
        - Location_inner
        input: ""
        ctx: "{}"
        type: type
      properties:
        loc:
          items:
            $ref: "#/components/schemas/Location_inner"
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
        input:
          title: Input
        ctx:
          title: Context
          type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    Location_inner:
      anyOf:
      - type: string
      - type: integer
  securitySchemes:
    APIKeyHeader:
      in: header
      name: X-Sidekick-Token
      type: apiKey

